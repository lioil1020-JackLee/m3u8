name: Build and Release m3u8

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.build_type }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        build_type: [onedir, onefile]

    env:
      PLAYWRIGHT_BROWSERS_PATH: browsers

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync project
        run: uv sync --locked --group dev

      - name: Install Playwright browser
        run: uv run playwright install chromium

      - name: Clean previous build outputs
        shell: pwsh
        run: |
          Remove-Item -LiteralPath build -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath dist -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build on Windows
        shell: pwsh
        run: |
          uv run pyinstaller --clean "m3u8-${{ matrix.build_type }}.spec"
          if ("${{ matrix.build_type }}" -eq "onedir") {
            Compress-Archive -Path dist/m3u8/* -DestinationPath dist/m3u8-windows-onedir.zip -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-${{ matrix.build_type }}-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p final_assets
          find raw_artifacts -type f \( -name "m3u8-*.zip" -o -name "m3u8-*.exe" \) -exec cp {} final_assets/ \;
          ls -lh final_assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: final_assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
